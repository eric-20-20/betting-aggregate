name: NBA Consensus Daily Run

on:
  # Manual trigger (safe testing)
  workflow_dispatch:

  # Daily cron (22:00 UTC = 5:00 PM ET)
  schedule:
    - cron: "0 22 * * *"

jobs:
  run-consensus:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run consensus with tracking
      - name: Run NBA consensus (tracked)
        run: |
          python consensus_nba.py --track

      