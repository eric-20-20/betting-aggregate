name: NBA Consensus Daily Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

jobs:
  run-consensus:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NBA consensus (tracked)
        run: |
          ls -la
          python consensus_nba.py --track

      - name: Upload latest run to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RUN_DIR="$(ls -dt data/runs/* | head -n 1)"
          echo "Latest run dir: $RUN_DIR"
          python3 scripts/upload_supabase.py "$RUN_DIR"